name: Terraform CI
on:
  push:
    branches: [ main ]          # Adjust to the branch(s) you protect
permissions:
  id-token: write            # Needed for OIDC token creation
  contents: read
jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_use_oidc: true   # <‑‑ enable the dynamic block for CI
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::163841615263:role/terraform-github-role
          aws-region: eu-north-1
      - name: Terraform Init (remote backend)
        run: terraform -chdir=infra/terraform init -upgrade -reconfigure
      - name: Terraform Plan
        run: terraform -chdir=infra/terraform plan
